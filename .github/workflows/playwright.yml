name: Run Tests At Push

on: [push]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz -o allure.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - run: pip install -r requirements.txt

      - run: playwright install chromium --with-deps

      - name: Run tests
        run: pytest --alluredir=allure-results
        continue-on-error: true

      - name: Get history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous history into results
        if: always()
        run: |
          mkdir -p allure-results
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Preserve history for next run
        if: always()
        run: |
          mkdir -p allure-history
          cp -r allure-report/. allure-history/

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload videos as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: videos/
          if-no-files-found: ignore
